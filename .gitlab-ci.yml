stages:
  - test

image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/archlinux:base-devel

test:
  stage: test
  tags:
    - x86_64-linux-kvm-docker
  script:
    - pacman -Sy --noconfirm --needed rust cargo-tarpaulin
    - cargo tarpaulin --out xml --engine llvm
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

fmt:
  stage: test
  tags:
    - x86_64-linux-kvm-docker
  script:
    - pacman -Sy --noconfirm --needed rust
    - cargo fmt --check

clippy:
  stage: test
  tags:
    - x86_64-linux-kvm-docker
  script:
    - pacman -Sy --noconfirm --needed rust
    - cargo clippy
